model:
  path: yolov8n.pt
  confidence: 0.45
  inference_size: 416
  process_every_n_frames: 3

living_camera:
  enabled: false
  width: 640
  height: 480
  fps: 15
  # 거실 카메라 화면에서 현관 접근 영역. 실제 설치 후 보정해야 함.
  entrance_roi: [380, 100, 640, 480]

entrance_camera:
  device: 0
  show_preview: true
  width: 640
  height: 480
  fps: 15
  # C920 현관 영상 기준. 실제 설치 후 보정해야 함.
  door_roi: [120, 40, 620, 470]

  # 진행 방향을 판정하는 두 개의 세로선.
  # 카메라 배치상 좌우가 반대면 indoor/outdoor 값을 서로 바꿀 것.
  indoor_line_x: 250
  outdoor_line_x: 430

fsm:
  approach_hold_seconds: 0.8
  disappear_confirm_seconds: 5.0
  reset_seconds: 3.0
  track_timeout_seconds: 1.0

frame_buffer:
  seconds: 20
  sample_interval_seconds: 1.0
  candidate_lookback_seconds: 10.0

best_frame:
  minimum_area_ratio: 0.05
  minimum_brightness: 25
  border_margin_px: 8
  weights:
    size: 0.40
    not_cut: 0.35
    sharpness: 0.25

clothing:
  # 라즈베리파이 단독 구현에서는 의복 종류보다 상·하의 대표 색상 추출에 집중.
  minimum_crop_height: 80
  saturation_ignore_threshold: 20
  value_ignore_low: 20
  value_ignore_high: 245

kakao:
  enabled: false
  access_token: "PUT_YOUR_ACCESS_TOKEN_HERE"
  # 나에게 보내기 REST API
  endpoint: "https://kapi.kakao.com/v2/api/talk/memo/default/send"
  link_url: "https://developers.kakao.com"
